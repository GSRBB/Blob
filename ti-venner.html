<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ti-Venner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
:root{
  --bg:#07060f;--card:#0e0d1c;--card2:#131222;--text:#fffffe;--sub:#6b6d88;--accent:#ff8906;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;
  font-family:'Nunito',sans-serif;user-select:none;}

.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 10% 5%, #1a0a3a18 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 90% 95%, #0a1a3a18 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 50%, #0f0a2010 0%,transparent 70%);}

#app{position:relative;z-index:1;width:100%;max-width:400px;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 14px 0;gap:7px;height:100vh;height:100dvh;}

/* Header */
header{width:100%;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Fredoka One',cursive;font-size:24px;
  background:linear-gradient(120deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px #ffd93d44);}
.scores{display:flex;gap:6px;}
.score-box{background:var(--card);border-radius:12px;padding:4px 10px 5px;text-align:center;
  border:1px solid #ffffff09;min-width:54px;}
.score-box .lbl{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);}
.score-box .val{font-size:17px;font-weight:900;color:var(--text);font-family:'Fredoka One',cursive;line-height:1.1;}

/* Level bar */
#levelRow{width:100%;display:flex;align-items:center;gap:8px;}
#levelBadge{font-family:'Fredoka One',cursive;font-size:13px;color:#fff;
  background:linear-gradient(135deg,#6bcb77,#4d96ff);
  border-radius:20px;padding:3px 12px;white-space:nowrap;flex-shrink:0;
  box-shadow:0 2px 10px #4d96ff44;}
#levelProgressWrap{flex:1;height:8px;background:#ffffff10;border-radius:4px;overflow:hidden;}
#levelProgressBar{height:100%;border-radius:4px;
  background:linear-gradient(90deg,#6bcb77,#4d96ff);transition:width 0.4s ease;width:0%;}

/* Bonus meter */
#bonusRow{width:100%;display:flex;align-items:center;gap:8px;}
#bonusLabel{font-family:'Fredoka One',cursive;font-size:11px;
  white-space:nowrap;flex-shrink:0;color:#ffd93d;text-shadow:0 0 8px #ffd93d88;}
#bonusMeterWrap{flex:1;height:10px;background:#ffffff0e;border-radius:5px;overflow:hidden;
  border:1px solid #ffffff08;}
#bonusMeterBar{height:100%;border-radius:5px;width:0%;
  background:linear-gradient(90deg,#ffd93d,#ff6b6b);
  box-shadow:0 0 8px #ffd93d88;transition:width 0.3s ease;}
#bonusCountdown{font-family:'Fredoka One',cursive;font-size:12px;
  color:#ffd93d;display:none;white-space:nowrap;flex-shrink:0;}

/* Combo bar */
#comboBar{width:100%;height:28px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.3s;pointer-events:none;}
#comboBar.show{opacity:1;}
#comboText{font-family:'Fredoka One',cursive;font-size:19px;letter-spacing:1px;white-space:nowrap;}
@keyframes comboPulse{0%{transform:scale(0.6);opacity:0;}60%{transform:scale(1.18);}100%{transform:scale(1);opacity:1;}}

/* Tray */
#tray{width:100%;background:var(--card);border-radius:16px;padding:7px 12px 7px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border:1px solid #ffffff08;box-shadow:0 2px 16px #00000055,inset 0 1px 0 #ffffff06;}
.tray-left{display:flex;flex-direction:column;gap:1px;}
.tray-lbl{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub);}
.tray-hint{font-size:8px;color:#ffffff33;font-weight:600;}
#nextBlobsContainer{display:flex;align-items:center;gap:5px;}
.blob-preview{display:flex;align-items:center;justify-content:center;border-radius:50%;}
.blob-preview svg{display:block;overflow:visible;}
.wild-badge{font-size:8px;font-weight:800;
  background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;background-size:200% 100%;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

/* Canvas */
#gameCanvas{border-radius:20px;border:1px solid #ffffff06;
  box-shadow:0 0 0 1px #ffffff04,0 8px 40px #00000088;
  display:block;flex-shrink:0;}

/* Bottom */
#bottomBar{width:100%;display:flex;gap:8px;
  padding-bottom:max(10px,env(safe-area-inset-bottom));margin-top:auto;}
.btn{flex:1;padding:10px 8px;border-radius:14px;border:none;
  font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;transition:transform 0.1s;}
.btn:active{transform:scale(0.95);}
.btn-primary{background:linear-gradient(135deg,#6bcb77,#4d96ff);color:#fff;
  box-shadow:0 4px 18px #4d96ff44;}
.btn-secondary{background:#0e0d1c;color:var(--sub);border:1px solid #ffffff0c;}
.btn-hidden{opacity:0;pointer-events:none;}

/* Hint bar */
#hintBar{width:100%;text-align:center;font-size:10px;font-weight:700;
  color:#ffffff22;letter-spacing:0.5px;margin-top:-4px;}

/* Popups */
.score-popup{position:fixed;font-family:'Fredoka One',cursive;
  pointer-events:none;z-index:999;
  animation:floatUp 1s cubic-bezier(.2,.8,.4,1) forwards;white-space:nowrap;}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(0.8);}
  20%{opacity:1;transform:translateY(-10px) scale(1.1);}
  100%{opacity:0;transform:translateY(-60px) scale(1);}}

.chain-total{position:fixed;left:50%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:44px;
  pointer-events:none;z-index:998;text-align:center;white-space:nowrap;
  animation:chainPop 1.4s cubic-bezier(.2,.8,.2,1) forwards;
  text-shadow:0 0 30px currentColor,0 4px 20px #000a;}
@keyframes chainPop{
  0%{opacity:0;transform:translateX(-50%) scale(0.4);}
  18%{opacity:1;transform:translateX(-50%) scale(1.25);}
  45%{opacity:1;transform:translateX(-50%) scale(1);}
  78%{opacity:1;transform:translateX(-50%) scale(1);}
  100%{opacity:0;transform:translateX(-50%) scale(0.85) translateY(-40px);}}

.combo-banner{position:fixed;left:50%;
  font-family:'Fredoka One',cursive;font-size:40px;
  pointer-events:none;z-index:997;text-align:center;white-space:nowrap;
  animation:bannerPop 1.1s cubic-bezier(.2,.8,.2,1) forwards;
  text-shadow:0 0 30px currentColor,0 4px 16px #0008;}
@keyframes bannerPop{
  0%{opacity:0;transform:translateX(-50%) scale(0.5);}
  15%{opacity:1;transform:translateX(-50%) scale(1.2);}
  40%{opacity:1;transform:translateX(-50%) scale(1);}
  75%{opacity:1;transform:translateX(-50%) scale(1);}
  100%{opacity:0;transform:translateX(-50%) scale(0.9) translateY(-30px);}}

#bonusFlash{position:fixed;inset:0;z-index:290;pointer-events:none;
  opacity:0;background:radial-gradient(ellipse at 50% 50%,#ffd93d33,transparent 70%);
  transition:opacity 0.4s;}
#bonusFlash.show{opacity:1;}

.bonus-announce{position:fixed;left:50%;top:35%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:46px;
  pointer-events:none;z-index:999;text-align:center;white-space:nowrap;
  animation:chainPop 1.6s cubic-bezier(.2,.8,.2,1) forwards;
  background:linear-gradient(90deg,#ffd93d,#ff6b6b,#6bcb77,#4d96ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px #ffd93d);}

.levelup-announce{position:fixed;left:50%;top:40%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:40px;color:#6bcb77;
  pointer-events:none;z-index:998;text-align:center;white-space:nowrap;
  animation:chainPop 1.4s cubic-bezier(.2,.8,.2,1) forwards;
  text-shadow:0 0 20px #6bcb77,0 4px 16px #000a;}

/* Game over */
#gameOver{display:none;position:fixed;inset:0;z-index:300;
  background:#07060fcc;backdrop-filter:blur(16px);
  align-items:center;justify-content:center;}
#gameOver.show{display:flex;}
.go-card{background:linear-gradient(160deg,#0e0d1c,#07060f);
  border:1px solid #ffffff0e;border-radius:28px;
  padding:28px 28px 24px;text-align:center;width:88%;max-width:290px;
  box-shadow:0 30px 80px #000000cc;}
.go-emoji{font-size:40px;margin-bottom:6px;}
.go-title{font-family:'Fredoka One',cursive;font-size:28px;
  background:linear-gradient(120deg,#6bcb77,#4d96ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:12px;}
.go-lbl{font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;}
.go-val{font-family:'Fredoka One',cursive;font-size:48px;color:#fff;line-height:1.0;}
.go-sub{font-size:11px;font-weight:800;margin-bottom:4px;}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div id="bonusFlash"></div>
<div id="app">
  <header>
    <div class="logo">Ti-Venner ✦</div>
    <div class="scores">
      <div class="score-box"><div class="lbl">Score</div><div class="val" id="scoreVal">0</div></div>
      <div class="score-box"><div class="lbl">Best</div><div class="val" id="bestVal">0</div></div>
    </div>
  </header>

  <div id="levelRow">
    <div id="levelBadge">LVL 1</div>
    <div id="levelProgressWrap"><div id="levelProgressBar"></div></div>
  </div>

  <div id="bonusRow">
    <div id="bonusLabel">⚡ BONUS</div>
    <div id="bonusMeterWrap"><div id="bonusMeterBar"></div></div>
    <div id="bonusCountdown"></div>
  </div>

  <div id="comboBar"><div id="comboText"></div></div>

  <div id="tray">
    <div class="tray-left">
      <div class="tray-lbl">Up Next</div>
      <div class="tray-hint" id="trayHint">drag to drop</div>
    </div>
    <div id="nextBlobsContainer"></div>
  </div>

  <canvas id="gameCanvas"></canvas>
  <div id="hintBar">make 10! pairs score ×3 · three-in-a-row scores ×2</div>

  <div id="bottomBar">
    <button class="btn btn-secondary" id="undoBtn" onclick="undoMove()">Undo</button>
    <button class="btn btn-primary" onclick="newGame()">New Game</button>
  </div>
</div>

<div id="gameOver">
  <div class="go-card">
    <div class="go-emoji">🎉</div>
    <div class="go-title">Well Done!</div>
    <div class="go-lbl">Score</div>
    <div class="go-val" id="goScore">0</div>
    <div class="go-sub" style="color:var(--accent)" id="goBest"></div>
    <div class="go-sub" style="color:#6bcb77;margin-bottom:4px;" id="goLevel"></div>
    <div class="go-sub" style="color:#ffd93d;margin-bottom:18px;" id="goCombo"></div>
    <button class="btn btn-primary" style="width:100%;font-size:16px;padding:12px;" onclick="newGame()">Play Again!</button>
  </div>
</div>

<script>
// =====================================================
//  TI-VENNER  ·  Friends of Ten
// =====================================================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

// ---- Level config ----
// maxNum: highest number blob that can appear
const LEVEL_CONFIG=[
  {level:1, maxNum:9, cols:6, queueSize:3, undo:true,  scoreNeeded:0},
  {level:2, maxNum:9, cols:6, queueSize:3, undo:true,  scoreNeeded:100},
  {level:3, maxNum:9, cols:6, queueSize:3, undo:true,  scoreNeeded:280},
  {level:4, maxNum:9, cols:6, queueSize:3, undo:true,  scoreNeeded:520},
  {level:5, maxNum:9, cols:6, queueSize:3, undo:true,  scoreNeeded:850},
  {level:6, maxNum:9, cols:6, queueSize:2, undo:false, scoreNeeded:1300},
  {level:7, maxNum:9, cols:6, queueSize:2, undo:false, scoreNeeded:1900},
  {level:8, maxNum:9, cols:6, queueSize:2, undo:false, scoreNeeded:2700},
  {level:9, maxNum:9, cols:5, queueSize:2, undo:false, scoreNeeded:3800},
  {level:10,maxNum:9, cols:5, queueSize:1, undo:false, scoreNeeded:5200},
];
function getLevelCfg(lvl){return LEVEL_CONFIG[Math.min(lvl-1,LEVEL_CONFIG.length-1)];}

let COLS=6,ROWS=8,CELL;

function resize(){
  const hdr=document.querySelector('header');
  const lvlRow=document.getElementById('levelRow');
  const bonusRow=document.getElementById('bonusRow');
  const cbar=document.getElementById('comboBar');
  const tray=document.getElementById('tray');
  const hint=document.getElementById('hintBar');
  const bar=document.getElementById('bottomBar');
  const vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
  const avail=vh-hdr.offsetHeight-lvlRow.offsetHeight-bonusRow.offsetHeight
    -cbar.offsetHeight-tray.offsetHeight-hint.offsetHeight-bar.offsetHeight-76;
  const maxByW=Math.floor((Math.min(window.innerWidth,400)-28)/COLS);
  const maxByH=Math.floor(avail/ROWS);
  CELL=Math.min(maxByW,maxByH,56);
  canvas.width=CELL*COLS;
  canvas.height=CELL*ROWS;
}

// ---- Number → colour mapping (1–9) ----
// Each number has its own vivid colour so kids recognise instantly
const NUM_COLORS={
  1:{fill:'#ff6b6b',mid:'#cc2222',dark:'#6e0000',glow:'#ff6b6b'}, // red
  2:{fill:'#ff9f43',mid:'#cc6600',dark:'#6e3000',glow:'#ff9f43'}, // orange
  3:{fill:'#ffd93d',mid:'#c9a000',dark:'#665000',glow:'#ffd93d'}, // yellow
  4:{fill:'#6bcb77',mid:'#2e9e3e',dark:'#0a4a18',glow:'#6bcb77'}, // green
  5:{fill:'#4d96ff',mid:'#1a5ecc',dark:'#002a80',glow:'#4d96ff'}, // blue
  6:{fill:'#c77dff',mid:'#8020cc',dark:'#380066',glow:'#c77dff'}, // purple
  7:{fill:'#ff6eb4',mid:'#cc2080',dark:'#6e0038',glow:'#ff6eb4'}, // pink
  8:{fill:'#00d2d3',mid:'#009999',dark:'#004444',glow:'#00d2d3'}, // teal
  9:{fill:'#ff8c42',mid:'#cc4a00',dark:'#6e2000',glow:'#ff8c42'}, // ember
};

// ---- Combo configs ----
const COMBO_CFG=[
  {min:2,label:'COMBO!',      color:'#ffd93d',mult:1.5},
  {min:3,label:'MEGA COMBO!', color:'#ff9f43',mult:2},
  {min:4,label:'ULTRA COMBO!',color:'#c77dff',mult:3},
  {min:5,label:'🔥 LEGENDARY!',color:'#ff6b6b',mult:5},
];

// ---- State ----
let grid=[],score=0,best=parseInt(localStorage.getItem('tiVennerBest')||'0'),undoStack=[];
let nextBlobs=[],dragBlob=null,animating=false,particles=[];
let comboCount=0,maxCombo=0,comboClearTimer=null,chainScoreAccum=0;
let currentLevel=1;
let bonusMeter=0,bonusActive=false,bonusMovesLeft=0;
let wildcardDropsLeft=0;

const TARGET=10;
const BONUS_FILL_NORMAL=10;
const BONUS_FILL_BIG=30;

// ===================== NEW GAME =====================
function newGame(){
  document.getElementById('gameOver').classList.remove('show');
  currentLevel=1;
  const cfg=getLevelCfg(1);
  COLS=cfg.cols;
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;undoStack=[];particles=[];
  comboCount=0;maxCombo=0;chainScoreAccum=0;
  bonusMeter=0;bonusActive=false;bonusMovesLeft=0;
  wildcardDropsLeft=10+Math.floor(Math.random()*4);
  updateScoreUI();updateLevelUI();updateBonusMeterUI();hideComboBar();
  nextBlobs=buildQueue(cfg);
  resize();updateTrayUI();renderAll();
  document.getElementById('undoBtn').classList.toggle('btn-hidden',!cfg.undo);
  document.getElementById('bonusFlash').classList.remove('show');
}

function buildQueue(cfg){
  const q=[];
  for(let i=0;i<cfg.queueSize;i++) q.push(rndBlob(cfg.maxNum));
  return q;
}

function rndBlob(maxNum){
  maxNum=maxNum||getLevelCfg(currentLevel).maxNum;
  const hi=Math.min(maxNum,9);

  // Count what's currently on the board (top-of-column blobs are most reachable)
  const need={}; // number -> how much we'd like to see it
  for(let n=1;n<=hi;n++) need[n]=1; // base weight so every number is possible

  // For each exposed blob on the board, boost its complement (TARGET - num)
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS;r++){
      const b=grid[r]?.[c];
      if(b&&!b.isWild){
        const comp=TARGET-b.num;
        if(comp>=1&&comp<=hi) need[comp]+=2.2; // strongly favour the pair partner
        break; // only the topmost blob of each column (most reachable)
      }
    }
  }

  // Slightly favour mid-range numbers early so kids see variety, not just 1s and 2s
  for(let n=1;n<=hi;n++){
    if(n>=3&&n<=7) need[n]+=0.6;
  }

  // Weighted random pick
  const total=Object.values(need).reduce((s,v)=>s+v,0);
  let pick=Math.random()*total;
  for(let n=1;n<=hi;n++){
    pick-=need[n];
    if(pick<=0) return {num:n,isWild:false};
  }
  return {num:1+Math.floor(Math.random()*hi),isWild:false};
}

function makeWild(){return {num:0,isWild:true};}

// ===================== LEVEL =====================
function updateLevelUI(){
  const cfg=getLevelCfg(currentLevel);
  const nextCfg=getLevelCfg(currentLevel+1);
  document.getElementById('levelBadge').textContent=`LVL ${currentLevel}`;
  const needed=nextCfg.scoreNeeded-cfg.scoreNeeded;
  const progress=Math.max(0,Math.min(100,((score-cfg.scoreNeeded)/needed)*100));
  document.getElementById('levelProgressBar').style.width=progress+'%';
}

function checkLevelUp(){
  if(currentLevel>=LEVEL_CONFIG.length) return;
  const nextCfg=getLevelCfg(currentLevel+1);
  if(score>=nextCfg.scoreNeeded){
    currentLevel++;
    const cfg=getLevelCfg(currentLevel);
    if(cfg.cols!==COLS){COLS=cfg.cols;grid=grid.map(r=>r.slice(0,COLS));resize();}
    document.getElementById('undoBtn').classList.toggle('btn-hidden',!cfg.undo);
    while(nextBlobs.length<cfg.queueSize) nextBlobs.push(rndBlob(cfg.maxNum));
    if(nextBlobs.length>cfg.queueSize) nextBlobs=nextBlobs.slice(0,cfg.queueSize);
    showLevelUpBanner(currentLevel,cfg.maxNum);
    updateLevelUI();updateTrayUI();
  }
}

function showLevelUpBanner(lvl,maxNum){
  const el=document.createElement('div');
  el.className='levelup-announce';
  el.textContent=`Level ${lvl}! Numbers up to ${maxNum} 🎉`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
}

// ===================== BONUS =====================
function fillBonusMeter(count){
  if(bonusActive) return;
  bonusMeter=Math.min(100,bonusMeter+(count<=2?BONUS_FILL_NORMAL:BONUS_FILL_BIG));
  updateBonusMeterUI();
  if(bonusMeter>=100) triggerBonusRound();
}

function updateBonusMeterUI(){
  document.getElementById('bonusMeterBar').style.width=bonusMeter+'%';
  const cd=document.getElementById('bonusCountdown');
  const lbl=document.getElementById('bonusLabel');
  if(bonusActive){
    cd.style.display='block';cd.textContent=`${bonusMovesLeft} left`;
    lbl.textContent='🔥 BONUS';
    document.getElementById('bonusMeterBar').style.background='linear-gradient(90deg,#ffd93d,#ffffff,#ffd93d)';
  } else {
    cd.style.display='none';lbl.textContent='⚡ BONUS';
    document.getElementById('bonusMeterBar').style.background='linear-gradient(90deg,#ffd93d,#ff6b6b)';
  }
}

function triggerBonusRound(){
  bonusActive=true;bonusMovesLeft=5;bonusMeter=100;
  const el=document.createElement('div');
  el.className='bonus-announce';el.textContent='✦ BONUS ROUND! ✦';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1700);
  document.getElementById('bonusFlash').classList.add('show');
  setTimeout(()=>document.getElementById('bonusFlash').classList.remove('show'),600);
  // Simplify: replace all board numbers >5 with 1–5
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const b=grid[r][c];if(b&&!b.isWild&&b.num>5) b.num=1+Math.floor(Math.random()*4);
  }
  // Queue also simplified
  nextBlobs=nextBlobs.map(b=>b.isWild?b:{...b,num:1+Math.floor(Math.random()*4)});
  updateTrayUI();updateBonusMeterUI();renderAll();
}

function tickBonusMove(){
  if(!bonusActive) return;
  bonusMovesLeft--;
  updateBonusMeterUI();
  if(bonusMovesLeft<=0){
    bonusActive=false;bonusMeter=0;
    const cfg=getLevelCfg(currentLevel);
    nextBlobs=nextBlobs.map(b=>b.isWild?b:rndBlob(cfg.maxNum));
    updateTrayUI();updateBonusMeterUI();renderAll();
  }
}

function getBonusMult(){return bonusActive?3:1;}

// ===================== SCORE =====================
function addScore(pts){
  score+=pts;
  if(score>best){best=score;localStorage.setItem('tiVennerBest',best);}
  updateScoreUI();updateLevelUI();
}
function updateScoreUI(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('bestVal').textContent=best;
}

// ===================== COMBO =====================
function incrementCombo(){comboCount++;if(comboCount>maxCombo)maxCombo=comboCount;showComboUI(comboCount);}
function resetCombo(){comboCount=0;hideComboBar();}
function showComboUI(count){
  const cfg=[...COMBO_CFG].reverse().find(c=>count>=c.min);if(!cfg) return;
  const bar=document.getElementById('comboBar'),text=document.getElementById('comboText');
  bar.classList.add('show');
  text.style.animation='none';text.offsetHeight;text.style.animation='comboPulse 0.35s ease-out';
  text.textContent=`${cfg.label}  ×${cfg.mult}`;
  text.style.background=`linear-gradient(90deg,${cfg.color},white,${cfg.color})`;
  text.style.webkitBackgroundClip='text';text.style.webkitTextFillColor='transparent';
  text.style.backgroundClip='text';text.style.backgroundSize='200% 100%';
  if(count>=3) showComboBanner(cfg,count);
  if(comboClearTimer) clearTimeout(comboClearTimer);
  comboClearTimer=setTimeout(hideComboBar,2000);
}
function hideComboBar(){document.getElementById('comboBar').classList.remove('show');}
function showComboBanner(cfg,count){
  const el=document.createElement('div');
  el.className='combo-banner';el.style.color=cfg.color;
  el.style.top=(window.innerHeight*0.42)+'px';
  el.textContent=count>=5?'🔥 LEGENDARY! 🔥':cfg.label;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1150);
}
function getComboMult(){const cfg=[...COMBO_CFG].reverse().find(c=>comboCount>=c.min);return cfg?cfg.mult:1;}

// ===================== TRAY =====================
function updateTrayUI(){
  const wrap=document.getElementById('nextBlobsContainer');
  wrap.innerHTML='';
  nextBlobs.forEach((b,i)=>{
    const size=i===0?44:32,r=size/2-2;
    const svg=b.isWild?makeWildSVG(r,size):makeNumSVG(b.num,r,size);
    const div=document.createElement('div');
    div.className='blob-preview';
    div.style.cssText=`width:${size}px;height:${size}px;opacity:${i===0?1:0.6};transform:scale(${i===0?1:0.88})`;
    div.innerHTML=svg;
    wrap.appendChild(div);
  });
  document.getElementById('trayHint').innerHTML=
    nextBlobs.some(b=>b.isWild)
      ?'<span class="wild-badge">✦ WILDCARD!</span>'
      :bonusActive?'<span style="color:#ffd93d;font-weight:800">🔥 BONUS ACTIVE</span>'
      :'drag to drop';
}

    <defs>
      <radialGradient id="${id}" cx="35%" cy="30%" r="65%">

        <stop offset="45%" stop-color="${col.fill}"/>
        <stop offset="100%" stop-color="${col.dark}"/>
      </radialGradient>
      <radialGradient id="${sid}" cx="30%" cy="25%" r="55%">
        <stop offset="0%" stop-color="white" stop-opacity="0.5"/>

      <filter id="f${id}" x="-50%" y="-50%" width="200%" height="200%">

function makeWildSVG(r,size){
  const cx=size/2,cy=size/2,id='wg'+Math.random().toString(36).slice(2,7);

    <defs>

// ===================== RENDER =====================
function renderAll(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();drawBlobs();renderParticles();if(dragBlob) drawDrag();
}

function drawGrid(){
  ctx.fillStyle='#07060f';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(bonusActive){
    const pulse=0.5+0.5*Math.sin(Date.now()*0.004);
    ctx.fillStyle=`rgba(255,217,61,${0.04+pulse*0.03})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  for(let c=0;c<COLS;c++){
    const filled=countColFilled(c),danger=filled/ROWS;
    if(danger>0.5){
      const a=((danger-0.5)/0.5)*0.22;
      ctx.fillStyle=`rgba(255,60,60,${a})`;
      roundRect(ctx,c*CELL+1,1,CELL-2,canvas.height-2,10);ctx.fill();
    }
  }
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.fillStyle=(r+c)%2===0?'#100f1e':'#0d0c1a';
    roundRect(ctx,c*CELL+2,r*CELL+2,CELL-4,CELL-4,10);ctx.fill();
    ctx.strokeStyle='#ffffff05';ctx.lineWidth=1;
    roundRect(ctx,c*CELL+2.5,r*CELL+2.5,CELL-5,CELL-5,10);ctx.stroke();
  }
  // Danger lines
  for(let c=0;c<COLS;c++){
    if(countColFilled(c)>=ROWS-1){
      const pulse=0.5+0.5*Math.sin(Date.now()*0.008);
      ctx.strokeStyle=`rgba(255,60,60,${0.6+pulse*0.4})`;
      ctx.lineWidth=3;ctx.beginPath();
      ctx.moveTo(c*CELL+4,3);ctx.lineTo(c*CELL+CELL-4,3);ctx.stroke();
    }
  }
  // Draw sum hints: highlight touching groups that sum to 10
  drawSumHints();
}

function drawSumHints(){
  // Lightly highlight any existing valid group edges
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const b=grid[r][c];if(!b) continue;
    // Check right and down neighbours for pairs summing to 10
    [[r,c+1],[r+1,c]].forEach(([nr,nc])=>{
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){
        const nb=grid[nr][nc];
        if(nb&&!b.isWild&&!nb.isWild&&b.num+nb.num===TARGET){
          ctx.strokeStyle='rgba(255,255,255,0.12)';
          ctx.lineWidth=2;
          ctx.beginPath();
          ctx.moveTo(c*CELL+CELL/2,r*CELL+CELL/2);
          ctx.lineTo(nc*CELL+CELL/2,nr*CELL+CELL/2);
          ctx.stroke();
        }
      }
    });
  }
}

function drawBlobs(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const b=grid[r][c];if(!b) continue;
    drawBlob(ctx,c*CELL+CELL/2,r*CELL+CELL/2,(CELL/2-5)*(b.scale??1),
      b.num,b.wobble||0,b.opacity??1,b.isWild);
  }
}

function drawBlob(c,cx,cy,r,num,wobble,opacity,isWild){
  if(r<=0) return;
  c.save();c.globalAlpha=opacity;
  c.translate(cx,cy);c.scale(1+wobble*0.12,1-wobble*0.08);
  if(isWild){drawWildBlob(c,r);}
  else{
    const col=NUM_COLORS[num]||NUM_COLORS[1];
    c.shadowColor=col.glow;c.shadowBlur=20;
    const g=c.createRadialGradient(-r*0.28,-r*0.32,r*0.04,0,0,r);
    g.addColorStop(0,lighten(col.fill,65));g.addColorStop(0.4,col.fill);
    g.addColorStop(0.8,col.mid);g.addColorStop(1,col.dark);
    c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fillStyle=g;c.fill();
    c.shadowBlur=0;
    // Shine
    const sh=c.createRadialGradient(-r*0.28,-r*0.38,0,-r*0.15,-r*0.25,r*0.6);
    sh.addColorStop(0,'rgba(255,255,255,0.52)');sh.addColorStop(1,'rgba(255,255,255,0)');
    c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fillStyle=sh;c.fill();
    c.beginPath();c.ellipse(-r*0.24,-r*0.3,r*0.18,r*0.11,-0.4,0,Math.PI*2);
    c.fillStyle='rgba(255,255,255,0.4)';c.fill();
    // Number
    c.shadowBlur=0;
    c.fillStyle='rgba(255,255,255,0.97)';
    c.font=`900 ${Math.round(r*0.72)}px "Fredoka One",cursive`;
    c.textAlign='center';c.textBaseline='middle';
    c.fillText(num,0,1);
  }
  c.restore();
}

function drawWildBlob(c,r){
  const t=Date.now()*0.002;
  c.shadowColor='white';c.shadowBlur=22;
  const g=c.createLinearGradient(-r,r,r,-r);
  [0,72,144,216,288,360].forEach((h,i)=>g.addColorStop(i/5,`hsl(${(h+t*50)%360},90%,62%)`));
  c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fillStyle=g;c.fill();
  c.shadowBlur=0;
  c.beginPath();c.arc(0,0,r-1,0,Math.PI*2);
  c.strokeStyle='rgba(255,255,255,0.5)';c.lineWidth=2;c.stroke();
  const sh=c.createRadialGradient(-r*0.28,-r*0.38,0,-r*0.15,-r*0.25,r*0.6);
  sh.addColorStop(0,'rgba(255,255,255,0.55)');sh.addColorStop(1,'rgba(255,255,255,0)');
  c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fillStyle=sh;c.fill();
  c.fillStyle='rgba(255,255,255,0.95)';
  c.font=`900 ${Math.round(r*0.72)}px "Fredoka One",cursive`;
  c.textAlign='center';c.textBaseline='middle';c.fillText('?',0,1);
}

function drawDrag(){
  const b=dragBlob,r=CELL/2-4;
  if(b.col>=0&&b.col<COLS){
    const col=b.isWild?'#ffffff':NUM_COLORS[b.num]?.glow||'#fff';
    ctx.fillStyle=col+'18';
    roundRect(ctx,b.col*CELL+3,3,CELL-6,canvas.height-6,10);ctx.fill();
    const tr=getDropRow(b.col);
    if(tr>=0){
      ctx.beginPath();ctx.arc(b.col*CELL+CELL/2,tr*CELL+CELL/2,r+4,0,Math.PI*2);
      ctx.strokeStyle=(b.isWild?'#ffffff':NUM_COLORS[b.num].fill)+'aa';
      ctx.lineWidth=2.5;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    }
  }
  ctx.globalAlpha=0.82;
  drawBlob(ctx,b.x,b.y,r,b.num,0,1,b.isWild);
  ctx.globalAlpha=1;
}

// ===================== PARTICLES =====================
function spawnPop(cx,cy,num,n=16,isWild=false){
  const col=isWild?null:NUM_COLORS[num]||NUM_COLORS[1];
  const colors=isWild
    ?['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff']
    :[col.fill,col.mid,lighten(col.fill,60),'#fff'];
  for(let i=0;i<n;i++){
    const angle=(Math.PI*2*i/n)+Math.random()*0.5,spd=2+Math.random()*5.5;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-1.2,
      r:3+Math.random()*5,color:colors[Math.floor(Math.random()*colors.length)],
      life:1,decay:0.022+Math.random()*0.018,isSquare:Math.random()<0.3});
  }
  for(let i=0;i<6;i++){
    const angle=Math.PI*2*i/6;
    const col2=isWild?colors[i%colors.length]:(NUM_COLORS[num]||NUM_COLORS[1]).fill;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*3.5,vy:Math.sin(angle)*3.5,
      r:7,color:col2+'88',life:1,decay:0.04,isRing:true});
  }
}

function renderParticles(){
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life*p.life;
    if(p.isRing){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(2-p.life),0,Math.PI*2);
      ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
    } else if(p.isSquare){
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
      const s=p.r*p.life;ctx.fillRect(p.x-s/2,p.y-s/2,s,s);
    } else {
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.vx*=0.96;p.life-=p.decay;
  }
}

// ===================== GAME LOGIC =====================
function getDropRow(col){for(let r=ROWS-1;r>=0;r--) if(!grid[r][col]) return r;return -1;}
function countColFilled(c){let n=0;for(let r=0;r<ROWS;r++) if(grid[r][c]) n++;return n;}

function dropBlob(col){
  if(animating) return;
  const blob=nextBlobs[0];
  const row=getDropRow(col);
  if(row<0) return;

  const cfg=getLevelCfg(currentLevel);
  undoStack.push({grid:deepClone(grid),score,nextBlobs:nextBlobs.map(b=>({...b})),
    comboCount,bonusMeter,bonusActive,bonusMovesLeft,currentLevel,COLS});
  if(undoStack.length>3) undoStack.shift();

  // Resolve wildcard num before placing
  let placedBlob={...blob,scale:0.1,wobble:0.9,opacity:1};
  if(blob.isWild){
    placedBlob.num=resolveWild(row,col);
    placedBlob.isWild=false;
  }
  grid[row][col]=placedBlob;
  animating=true;chainScoreAccum=0;

  if(bonusActive) tickBonusMove();

  animateDrop(row,col,()=>{
    const mergeHappened={value:false};
    checkSums(row,col,mergeHappened,()=>{
      if(!mergeHappened.value) resetCombo();
      if(chainScoreAccum>=30) showChainTotal(chainScoreAccum);
      animating=false;
      nextBlobs.shift();
      wildcardDropsLeft--;
      let newBlob;
      if(wildcardDropsLeft<=0){
        newBlob=makeWild();
        wildcardDropsLeft=10+Math.floor(Math.random()*5);
      } else {
        newBlob=bonusActive?{...rndBlob(5)}:rndBlob(cfg.maxNum);
      }
      if(nextBlobs.length<cfg.queueSize) nextBlobs.push(newBlob);
      checkLevelUp();updateTrayUI();checkGameOver();renderAll();
    });
  });
}

// Wildcard: pick number that completes TARGET with a neighbour
function resolveWild(row,col){
  const counts={};
  [[row-1,col],[row+1,col],[row,col-1],[row,col+1]].forEach(([r,c])=>{
    if(r>=0&&r<ROWS&&c>=0&&c<COLS&&grid[r][c]&&!grid[r][c].isWild){
      const need=TARGET-grid[r][c].num;
      if(need>=1&&need<=9) counts[need]=(counts[need]||0)+1;
    }
  });
  let best=-1,bc=0;
  Object.entries(counts).forEach(([k,v])=>{if(v>bc){bc=v;best=parseInt(k);}});
  return best>=1?best:1+Math.floor(Math.random()*Math.min(getLevelCfg(currentLevel).maxNum,9));
}

function animateDrop(row,col,cb){
  const b=grid[row][col];let t=0;
  const tick=()=>{
    t++;b.scale=Math.min(1,0.1+t*0.075);
    b.wobble=Math.sin(t*0.38)*Math.exp(-t*0.07);
    renderAll();
    if(t<28) requestAnimationFrame(tick);
    else{b.scale=1;b.wobble=0;cb();}
  };
  requestAnimationFrame(tick);
}

// ---- Check for groups summing to TARGET ----
function checkSums(row,col,mergeFlag,cb){
  // Find all connected groups (flood) that sum to exactly TARGET
  const cleared=findClearableGroups();
  if(cleared.length===0){cb();return;}

  mergeFlag.value=true;
  incrementCombo();
  fillBonusMeter(cleared.length);

  // Scoring based on what kind of clear happened:
  //  perfect pair (2 blobs)      = ×3
  //  straight 3-in-a-row = 10    = ×2
  //  otherwise                   = ×1
  let sizeMult=1;
  let bonusLabel='';
  if(lastClearMeta.pair && cleared.length===2){ sizeMult=3; bonusLabel='PERFECT PAIR! ×3'; }
  else if(lastClearMeta.lineOf3){ sizeMult=2; bonusLabel='3-IN-A-ROW! ×2'; }

  const comboMult=getComboMult();
  const bonusMult=getBonusMult();
  const pts=Math.round(cleared.length*10*sizeMult*comboMult*bonusMult);
  addScore(pts);chainScoreAccum+=pts;

  const avgR=Math.round(cleared.reduce((s,c)=>s+c[0],0)/cleared.length);
  const avgC=Math.round(cleared.reduce((s,c)=>s+c[1],0)/cleared.length);

  cleared.forEach(([r,c])=>{
    spawnPop(c*CELL+CELL/2,r*CELL+CELL/2,grid[r][c].num,14);
    grid[r][c]=null;
  });

  showMergePopup(pts,avgC*CELL+CELL/2,avgR*CELL+CELL/2,sizeMult,comboMult,bonusMult,cleared.length,bonusLabel);
  applyGravity();

  let t=0;
  const tick=()=>{
    t++;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const b=grid[r][c];if(!b) continue;
      if((b.scale??1)<1) b.scale=Math.min(1,(b.scale||0)+0.09);
      if(Math.abs(b.wobble||0)>0.01) b.wobble*=0.9;
    }
    renderAll();
    if(t<28) requestAnimationFrame(tick);
    // Check for chain reactions after gravity
    else checkSums(row,col,mergeFlag,cb);
  };
  requestAnimationFrame(tick);
}

// Find cells to clear. Priority: straight lines (2 or 3) summing to 10,
// then small adjacent groups. Returns {cells:[...], lineOf3:bool, pair:bool}
let lastClearMeta={lineOf3:false,pair:false,size:0};

function findClearableGroups(){
  const visited=new Set();
  const allClear=[];
  let sawLineOf3=false, sawPair=false, firstSize=0;
  const key=(r,c)=>`${r},${c}`;
  const alive=(r,c)=>r>=0&&r<ROWS&&c>=0&&c<COLS&&grid[r][c]&&!grid[r][c].isWild&&!visited.has(key(r,c));

  // --- PASS 1: horizontal & vertical straight triples summing to 10 ---
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    // horizontal triple
    if(alive(r,c)&&alive(r,c+1)&&alive(r,c+2)){
      const s=grid[r][c].num+grid[r][c+1].num+grid[r][c+2].num;
      if(s===TARGET){
        [[r,c],[r,c+1],[r,c+2]].forEach(([rr,cc])=>{visited.add(key(rr,cc));allClear.push([rr,cc]);});
        sawLineOf3=true; if(!firstSize) firstSize=3;
      }
    }
    // vertical triple
    if(alive(r,c)&&alive(r+1,c)&&alive(r+2,c)){
      const s=grid[r][c].num+grid[r+1][c].num+grid[r+2][c].num;
      if(s===TARGET){
        [[r,c],[r+1,c],[r+2,c]].forEach(([rr,cc])=>{visited.add(key(rr,cc));allClear.push([rr,cc]);});
        sawLineOf3=true; if(!firstSize) firstSize=3;
      }
    }
  }

  // --- PASS 2: adjacent pairs summing to 10 ---
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(alive(r,c)){
      // right neighbour
      if(alive(r,c+1)&&grid[r][c].num+grid[r][c+1].num===TARGET){
        visited.add(key(r,c));visited.add(key(r,c+1));
        allClear.push([r,c],[r,c+1]); sawPair=true; if(!firstSize) firstSize=2; continue;
      }
      // down neighbour
      if(alive(r+1,c)&&grid[r][c].num+grid[r+1][c].num===TARGET){
        visited.add(key(r,c));visited.add(key(r+1,c));
        allClear.push([r,c],[r+1,c]); sawPair=true; if(!firstSize) firstSize=2;
      }
    }
  }

  lastClearMeta={lineOf3:sawLineOf3,pair:sawPair,size:firstSize};
  return allClear;
}

function getConnectedComponent(sr,sc){
  const found=[],visited=new Set(),q=[[sr,sc]];
  const startNum=grid[sr][sc]?.num;
  while(q.length){
    const[r,c]=q.shift(),k=`${r},${c}`;
    if(visited.has(k)) continue;visited.add(k);
    const b=grid[r]?.[c];if(!b) continue;
    found.push([r,c]);
    [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&grid[nr][nc]) q.push([nr,nc]);
    });
  }
  return found;
}

function areNeighbours(r1,c1,r2,c2){
  return Math.abs(r1-r2)+Math.abs(c1-c2)===1;
}

function applyGravity(){
  for(let c=0;c<COLS;c++){
    let w=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){if(grid[r][c]){grid[w][c]=grid[r][c];if(w!==r)grid[r][c]=null;w--;}}
    for(let r=w;r>=0;r--) grid[r][c]=null;
  }
}

function checkGameOver(){
  for(let c=0;c<COLS;c++) if(countColFilled(c)>=ROWS){setTimeout(showGameOver,500);return;}
}
function showGameOver(){
  document.getElementById('goScore').textContent=score;
  document.getElementById('goBest').textContent=score>=best?'🏆 New Best!':`Best: ${best}`;
  document.getElementById('goLevel').textContent=`Reached Level ${currentLevel}`;
  document.getElementById('goCombo').textContent=maxCombo>2?`🔥 Best combo ×${getMultForCombo(maxCombo)}`:'';
  document.getElementById('gameOver').classList.add('show');
}
function getMultForCombo(n){const cfg=[...COMBO_CFG].reverse().find(c=>n>=c.min);return cfg?cfg.mult:1;}

function undoMove(){
  if(!undoStack.length||animating) return;
  const p=undoStack.pop();
  grid=p.grid;score=p.score;nextBlobs=p.nextBlobs;comboCount=p.comboCount;
  bonusMeter=p.bonusMeter;bonusActive=p.bonusActive;bonusMovesLeft=p.bonusMovesLeft;
  currentLevel=p.currentLevel;
  if(p.COLS!==COLS){COLS=p.COLS;resize();}
  updateScoreUI();updateLevelUI();updateBonusMeterUI();
  updateTrayUI();hideComboBar();renderAll();
  document.getElementById('undoBtn').classList.toggle('btn-hidden',!getLevelCfg(currentLevel).undo);
}

function showMergePopup(pts,x,y,sizeMult,comboMult,bonusMult,count,bonusLabel){
  const el=document.createElement('div');
  el.className='score-popup';
  const parts=[];
  if(bonusLabel) parts.push(bonusLabel);
  if(comboMult>1) parts.push(`combo ×${comboMult}`);
  if(bonusMult>1) parts.push(`🔥×${bonusMult}`);
  el.textContent='+'+pts+(parts.length?' ('+parts.join(' ')+')'  :'');
  el.style.color=sizeMult===3?'#ffd93d':sizeMult===2?'#6bcb77':bonusMult>1?'#ff9f43':comboMult>1?'#c77dff':'#4d96ff';
  el.style.fontSize=(sizeMult>=2||comboMult>=2?25:21)+'px';
  const rect=canvas.getBoundingClientRect();
  el.style.left=(rect.left+x-70)+'px';
  el.style.top=(rect.top+y-20)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
}

function showChainTotal(total){
  const el=document.createElement('div');
  el.className='chain-total';
  el.style.color=total>=300?'#ff6b6b':total>=150?'#c77dff':total>=80?'#ffd93d':'#6bcb77';
  el.textContent='+'+total+' pts!';
  el.style.top=(window.innerHeight*0.28)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1500);
}

function deepClone(g){return g.map(row=>row.map(cell=>cell?{...cell}:null));}
function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ---- Input ----
let pDown=false;
function getCol(clientX){const rect=canvas.getBoundingClientRect();return Math.floor((clientX-rect.left)/CELL);}
function getPos(cx,cy){const rect=canvas.getBoundingClientRect();return{x:cx-rect.left,y:cy-rect.top};}
canvas.addEventListener('pointerdown',e=>{
  if(animating) return;pDown=true;
  const p=getPos(e.clientX,e.clientY);
  dragBlob={...nextBlobs[0],x:p.x,y:p.y,col:getCol(e.clientX)};renderAll();
});
canvas.addEventListener('pointermove',e=>{
  if(!pDown||!dragBlob) return;
  const p=getPos(e.clientX,e.clientY);
  dragBlob.x=p.x;dragBlob.y=p.y;dragBlob.col=getCol(e.clientX);renderAll();
});
canvas.addEventListener('pointerup',e=>{
  if(!pDown||!dragBlob) return;pDown=false;
  const col=getCol(e.clientX);dragBlob=null;
  if(col>=0&&col<COLS) dropBlob(col);else renderAll();
});
canvas.addEventListener('pointerleave',e=>{
  if(pDown&&dragBlob){pDown=false;const col=dragBlob.col;dragBlob=null;
    if(col>=0&&col<COLS) dropBlob(col);else renderAll();}
});

// ---- Idle loop ----
let lt=0;
function idle(ts){
  requestAnimationFrame(idle);
  const hasWild=nextBlobs[0]?.isWild||grid.some(row=>row.some(b=>b&&b.isWild));
  if(!animating&&!dragBlob&&ts-lt>32){
    lt=ts;
    let dirty=particles.length>0||hasWild||bonusActive;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const b=grid[r][c];
      if(b&&Math.abs(b.wobble||0)>0.005){b.wobble*=0.9;dirty=true;}
    }
    if(dirty) renderAll();
  }
}
requestAnimationFrame(idle);

window.addEventListener('resize',()=>{resize();updateTrayUI();renderAll();});
newGame();
</script>
