<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calico Cat Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 10%, #ffd 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 70%, #ffd 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 45%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, #fff 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #gameWrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #title {
    color: #ff9ed2;
    font-size: 18px;
    text-shadow: 3px 3px 0 #a0006a, 0 0 20px #ff9ed2aa;
    letter-spacing: 2px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 3px 3px 0 #a0006a, 0 0 20px #ff9ed2aa; }
    50% { text-shadow: 3px 3px 0 #a0006a, 0 0 35px #ff9ed2ee; }
  }

  #scoreDisplay {
    color: #ffe680;
    font-size: 11px;
    text-shadow: 2px 2px 0 #a07000;
    letter-spacing: 1px;
  }

  canvas {
    display: block;
    border: 3px solid #ff9ed2;
    border-radius: 4px;
    box-shadow: 0 0 30px #ff9ed255, 0 0 60px #ff9ed222, inset 0 0 30px #00000055;
    image-rendering: pixelated;
  }

  #instructions {
    color: #aaa;
    font-size: 8px;
    text-align: center;
    line-height: 1.8;
    letter-spacing: 1px;
  }

  #instructions span {
    color: #ff9ed2;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="title">🐱 CALICO RUNNER</div>
  <div id="scoreDisplay">SCORE: <span id="score">0</span> &nbsp;&nbsp; BEST: <span id="best">0</span></div>
  <canvas id="gameCanvas" width="700" height="200"></canvas>
  <div id="instructions">
    <span>SPACE / TAP</span> — JUMP &nbsp;&nbsp; <span>DOUBLE JUMP</span> — ALLOWED!
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

// ---- Palette ----
const SKY_TOP    = '#0d0520';
const SKY_BOT    = '#1a0a40';
const GROUND_COL = '#2a1550';
const GROUND_LINE= '#ff9ed2';
const MOON_COL   = '#fff8cc';

// ---- Game State ----
let state = 'idle'; // idle | running | dead
let score = 0, best = 0, frame = 0;
let speed = 4;
const GROUND_Y = 160;

// ---- Cat ----
const cat = {
  x: 90, y: GROUND_Y, vy: 0,
  w: 38, h: 38,
  jumps: 0,
  maxJumps: 2,
  isOnGround() { return this.y >= GROUND_Y; },
  jump() {
    if (this.jumps < this.maxJumps) {
      this.vy = -11;
      this.jumps++;
    }
  },
  update() {
    this.vy += 0.55;
    this.y += this.vy;
    if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.vy = 0; this.jumps = 0; }
  }
};

// ---- Obstacles ----
let obstacles = [];
let obstTimer = 0;
let obstInterval = 90;

function spawnObstacle() {
  const types = ['cactus', 'bird', 'doubleCactus'];
  const type = types[Math.floor(Math.random() * types.length)];
  let h, y, w;
  if (type === 'bird') {
    h = 24; w = 32;
    y = GROUND_Y - 60 - Math.random() * 30;
  } else if (type === 'doubleCactus') {
    h = 42; w = 44; y = GROUND_Y - h + 8;
  } else {
    h = 32 + Math.floor(Math.random() * 16); w = 20; y = GROUND_Y - h + 8;
  }
  obstacles.push({ x: 720, y, w, h, type });
}

// ---- Clouds ----
let clouds = [
  { x: 150, y: 30, w: 60, speed: 0.4 },
  { x: 400, y: 50, w: 80, speed: 0.3 },
  { x: 600, y: 20, w: 50, speed: 0.5 },
];

// ---- Draw helpers ----
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, SKY_TOP);
  grad.addColorStop(1, SKY_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, GROUND_Y);

  // Moon
  ctx.save();
  ctx.shadowColor = '#fff8cc';
  ctx.shadowBlur = 20;
  ctx.fillStyle = MOON_COL;
  ctx.beginPath();
  ctx.arc(620, 35, 18, 0, Math.PI * 2);
  ctx.fill();
  // Moon craters
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ede8b0';
  ctx.beginPath(); ctx.arc(613, 30, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(625, 38, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Clouds
  ctx.fillStyle = '#ffffff18';
  for (const c of clouds) {
    roundRect(ctx, c.x, c.y, c.w, 18, 9);
    roundRect(ctx, c.x + 10, c.y - 10, c.w - 20, 16, 8);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = GROUND_COL;
  ctx.fillRect(0, GROUND_Y + cat.h - 8, canvas.width, canvas.height - (GROUND_Y + cat.h - 8));
  ctx.strokeStyle = GROUND_LINE;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + cat.h - 8);
  ctx.lineTo(canvas.width, GROUND_Y + cat.h - 8);
  ctx.stroke();

  // Ground dots
  ctx.fillStyle = '#ff9ed233';
  for (let i = 0; i < 14; i++) {
    const gx = ((i * 52 - frame * speed * 0.3) % (canvas.width + 52) + canvas.width + 52) % (canvas.width + 52);
    ctx.beginPath();
    ctx.arc(gx, GROUND_Y + cat.h, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ---- Draw Calico Cat ----
function drawCat() {
  const x = cat.x, y = cat.y, s = cat.w;
  const running = state === 'running';
  const legCycle = Math.sin(frame * 0.35) * 4;
  const bodyBob = cat.isOnGround() ? Math.sin(frame * 0.35) * 1.5 : 0;

  // Body
  ctx.save();
  ctx.translate(x + s / 2, y + s / 2 + bodyBob);

  // Tail
  const tailWag = Math.sin(frame * 0.2) * 15;
  ctx.save();
  ctx.strokeStyle = '#e8a87c';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-s / 2 + 2, 4);
  ctx.quadraticCurveTo(-s / 2 - 10, -8 + tailWag, -s / 2 - 6, -18 + tailWag);
  ctx.stroke();
  // Tail tip (calico orange)
  ctx.strokeStyle = '#f4c07a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-s / 2 - 6, -18 + tailWag);
  ctx.lineTo(-s / 2 - 4, -24 + tailWag);
  ctx.stroke();
  ctx.restore();

  // Legs
  const legColor = '#d4a0d4';
  ctx.fillStyle = legColor;
  if (running) {
    // Front legs
    ctx.fillRect(-4, 6, 5, 10 + legCycle);
    ctx.fillRect(6, 6, 5, 10 - legCycle);
    // Back legs
    ctx.fillRect(-14, 6, 5, 10 - legCycle);
    ctx.fillRect(-4, 6, 5, 10 + legCycle);
  } else {
    ctx.fillRect(-14, 6, 5, 12);
    ctx.fillRect(-4, 6, 5, 12);
    ctx.fillRect(6, 6, 5, 12);
  }

  // Body (calico: white base)
  ctx.fillStyle = '#f5f0f5';
  roundRect(ctx, -s/2 + 2, -s/2 + 8, s - 4, s/2 + 2, 8);
  ctx.fill();

  // Calico patches on body
  ctx.fillStyle = '#e08040'; // orange patch
  ctx.beginPath();
  ctx.ellipse(-4, -s/2 + 14, 8, 6, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#2a1020'; // dark patch
  ctx.beginPath();
  ctx.ellipse(6, -s/2 + 18, 6, 5, -0.2, 0, Math.PI*2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f5f0f5';
  ctx.beginPath();
  ctx.ellipse(4, -s/2 + 2, 12, 11, 0, 0, Math.PI*2);
  ctx.fill();

  // Head calico patches
  ctx.fillStyle = '#e08040';
  ctx.beginPath();
  ctx.ellipse(0, -s/2, 5, 4, 0.5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#2a1020';
  ctx.beginPath();
  ctx.ellipse(10, -s/2 + 4, 4, 3, -0.3, 0, Math.PI*2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#f5f0f5';
  // Left ear
  ctx.beginPath();
  ctx.moveTo(-6, -s/2 - 2);
  ctx.lineTo(-10, -s/2 - 12);
  ctx.lineTo(-1, -s/2 - 3);
  ctx.closePath(); ctx.fill();
  // Right ear
  ctx.beginPath();
  ctx.moveTo(10, -s/2 - 2);
  ctx.lineTo(14, -s/2 - 12);
  ctx.lineTo(6, -s/2 - 3);
  ctx.closePath(); ctx.fill();

  // Inner ears (pink)
  ctx.fillStyle = '#ff9ed2';
  ctx.beginPath();
  ctx.moveTo(-5, -s/2 - 3);
  ctx.lineTo(-8, -s/2 - 10);
  ctx.lineTo(-2, -s/2 - 4);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(10, -s/2 - 3);
  ctx.lineTo(12, -s/2 - 10);
  ctx.lineTo(7, -s/2 - 4);
  ctx.closePath(); ctx.fill();

  // Eyes
  const eyeOpen = state === 'dead' ? 0.3 : 1;
  ctx.fillStyle = '#1a0a2e';
  ctx.beginPath();
  ctx.ellipse(-1, -s/2 + 1, 2.5, 3 * eyeOpen, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(9, -s/2 + 1, 2.5, 3 * eyeOpen, 0, 0, Math.PI*2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(0, -s/2, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -s/2, 1, 0, Math.PI*2); ctx.fill();

  // Dead X eyes
  if (state === 'dead') {
    ctx.strokeStyle = '#ff4466';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-3, -s/2 - 2); ctx.lineTo(1, -s/2 + 2);
    ctx.moveTo(1, -s/2 - 2); ctx.lineTo(-3, -s/2 + 2);
    ctx.moveTo(7, -s/2 - 2); ctx.lineTo(11, -s/2 + 2);
    ctx.moveTo(11, -s/2 - 2); ctx.lineTo(7, -s/2 + 2);
    ctx.stroke();
  }

  // Nose
  ctx.fillStyle = '#ff9ed2';
  ctx.beginPath();
  ctx.moveTo(3, -s/2 + 5);
  ctx.lineTo(5, -s/2 + 5);
  ctx.lineTo(4, -s/2 + 7);
  ctx.closePath(); ctx.fill();

  // Whiskers
  ctx.strokeStyle = '#ffffff66';
  ctx.lineWidth = 1;
  [-1, 0, 1].forEach(i => {
    ctx.beginPath();
    ctx.moveTo(-2, -s/2 + 5 + i*2);
    ctx.lineTo(-14, -s/2 + 4 + i*2.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(10, -s/2 + 5 + i*2);
    ctx.lineTo(22, -s/2 + 4 + i*2.5);
    ctx.stroke();
  });

  ctx.restore();
}

// ---- Draw Obstacle ----
function drawObstacle(o) {
  ctx.save();
  if (o.type === 'bird') {
    // Owl/bird
    ctx.fillStyle = '#9966cc';
    roundRect(ctx, o.x, o.y, o.w, o.h, 6);
    ctx.fill();
    // Wings flap
    const flap = Math.sin(frame * 0.25) * 5;
    ctx.fillStyle = '#bb88ee';
    ctx.beginPath();
    ctx.ellipse(o.x + 2, o.y + 10 + flap, 12, 6, -0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(o.x + o.w - 2, o.y + 10 + flap, 12, 6, 0.4, 0, Math.PI*2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ffe680';
    ctx.beginPath(); ctx.arc(o.x + 10, o.y + 8, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x + 22, o.y + 8, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a0a2e';
    ctx.beginPath(); ctx.arc(o.x + 10, o.y + 8, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x + 22, o.y + 8, 2, 0, Math.PI*2); ctx.fill();
    // Beak
    ctx.fillStyle = '#ff9922';
    ctx.beginPath();
    ctx.moveTo(o.x + 14, o.y + 13);
    ctx.lineTo(o.x + 18, o.y + 13);
    ctx.lineTo(o.x + 16, o.y + 18);
    ctx.closePath(); ctx.fill();

  } else if (o.type === 'doubleCactus') {
    // Double cactus — glowing purple spiky rock
    ctx.fillStyle = '#5a2080';
    roundRect(ctx, o.x, o.y + 8, 18, o.h - 8, 4); ctx.fill();
    roundRect(ctx, o.x + 22, o.y, 18, o.h, 4); ctx.fill();
    // Spikes
    ctx.fillStyle = '#cc88ff';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(o.x + 5 + i * 4, o.y + 10);
      ctx.lineTo(o.x + 7 + i * 4, o.y + 3);
      ctx.lineTo(o.x + 9 + i * 4, o.y + 10);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(o.x + 24 + i * 4, o.y + 2);
      ctx.lineTo(o.x + 26 + i * 4, o.y - 6);
      ctx.lineTo(o.x + 28 + i * 4, o.y + 2);
      ctx.fill();
    }
    // Glow
    ctx.shadowColor = '#cc88ff';
    ctx.shadowBlur = 10;
    ctx.strokeStyle = '#cc88ff44';
    ctx.lineWidth = 1;
    roundRect(ctx, o.x, o.y + 8, 18, o.h - 8, 4); ctx.stroke();
    roundRect(ctx, o.x + 22, o.y, 18, o.h, 4); ctx.stroke();
    ctx.shadowBlur = 0;

  } else {
    // Single cactus
    ctx.fillStyle = '#3d1060';
    roundRect(ctx, o.x + 4, o.y, 12, o.h, 4); ctx.fill();
    // Arms
    ctx.fillStyle = '#4a1570';
    roundRect(ctx, o.x, o.y + 8, 8, 7, 3); ctx.fill();
    roundRect(ctx, o.x + 12, o.y + 12, 8, 7, 3); ctx.fill();
    // Spikes
    ctx.fillStyle = '#aa66ff';
    [o.x + 2, o.x + 7, o.x + 14].forEach(sx => {
      ctx.beginPath();
      ctx.moveTo(sx, o.y + 4);
      ctx.lineTo(sx + 2, o.y - 4);
      ctx.lineTo(sx + 4, o.y + 4);
      ctx.fill();
    });
  }
  ctx.restore();
}

// ---- Particles ----
let particles = [];
function spawnParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
      life: 1, color: ['#ff9ed2','#ffe680','#cc88ff','#ffffff'][Math.floor(Math.random()*4)]
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ---- Overlay text ----
function drawOverlay() {
  ctx.save();
  ctx.textAlign = 'center';

  if (state === 'idle') {
    ctx.fillStyle = '#ffffff22';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '14px "Press Start 2P"';
    ctx.fillStyle = '#ffe680';
    ctx.shadowColor = '#ffe680';
    ctx.shadowBlur = 12;
    ctx.fillText('PRESS SPACE OR TAP', canvas.width / 2, 90);
    ctx.font = '9px "Press Start 2P"';
    ctx.fillStyle = '#ff9ed2';
    ctx.shadowColor = '#ff9ed2';
    ctx.fillText('TO START RUNNING!', canvas.width / 2, 115);
    ctx.shadowBlur = 0;
  }

  if (state === 'dead') {
    ctx.fillStyle = '#1a0a2e99';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '16px "Press Start 2P"';
    ctx.fillStyle = '#ff4466';
    ctx.shadowColor = '#ff4466';
    ctx.shadowBlur = 16;
    ctx.fillText('GAME OVER', canvas.width / 2, 75);
    ctx.shadowBlur = 0;

    ctx.font = '9px "Press Start 2P"';
    ctx.fillStyle = '#ffe680';
    ctx.fillText('SCORE: ' + score, canvas.width / 2, 105);
    if (score >= best) {
      ctx.fillStyle = '#ff9ed2';
      ctx.fillText('✦ NEW BEST! ✦', canvas.width / 2, 122);
    }

    ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#aaaaaa';
    ctx.fillText('SPACE / TAP TO RETRY', canvas.width / 2, 148);
  }
  ctx.restore();
}

// ---- Collision ----
function checkCollision(o) {
  const margin = 6;
  return (
    cat.x + margin < o.x + o.w - margin &&
    cat.x + cat.w - margin > o.x + margin &&
    cat.y + margin < o.y + o.h - margin &&
    cat.y + cat.h - margin > o.y + margin
  );
}

// ---- Main Loop ----
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  // Update clouds
  for (const c of clouds) {
    c.x -= c.speed;
    if (c.x + c.w < 0) c.x = canvas.width + 20;
  }

  if (state === 'running') {
    frame++;
    score++;
    speed = 4 + score / 500;
    scoreEl.textContent = score;

    cat.update();

    // Obstacles
    obstTimer++;
    if (obstTimer >= obstInterval) {
      spawnObstacle();
      obstTimer = 0;
      obstInterval = 70 + Math.floor(Math.random() * 60) - Math.min(20, score / 200);
    }
    for (const o of obstacles) o.x -= speed;
    obstacles = obstacles.filter(o => o.x + o.w > -10);

    // Collision
    for (const o of obstacles) {
      if (checkCollision(o)) {
        state = 'dead';
        if (score > best) { best = score; bestEl.textContent = best; }
        spawnParticles(cat.x + cat.w/2, cat.y + cat.h/2);
        break;
      }
    }
  }

  for (const o of obstacles) drawObstacle(o);
  drawCat();
  updateParticles();
  drawOverlay();

  requestAnimationFrame(loop);
}

// ---- Input ----
function handleAction() {
  if (state === 'idle' || state === 'dead') {
    state = 'running';
    score = 0; frame = 0; speed = 4;
    obstacles = []; obstTimer = 0; obstInterval = 90;
    cat.y = GROUND_Y; cat.vy = 0; cat.jumps = 0;
    particles = [];
    scoreEl.textContent = '0';
  } else if (state === 'running') {
    cat.jump();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleAction(); }
});
canvas.addEventListener('click', handleAction);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleAction(); }, { passive: false });

loop();
</script>
</body>
</html>
